services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      TIANGOU_DATABASE_PATH: /data/tiangou.sqlite3
    volumes:
      - tiangou-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

  dashboard-v18:
    build:
      context: ./tiangou-ai-dashboard-v18
      args:
        VITE_BACKEND_URL: /api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  tiangou-data:
