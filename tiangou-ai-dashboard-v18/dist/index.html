<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tiangou AI — physics-informed grid stability decision-support interface"
    />
    <title>Tiangou AI | Grid Stability Command Center</title>
    <style>
      html, body { min-height: 100%; margin: 0; background: #07131b; color: #e8f6f5; font-family: Arial, sans-serif; }
      #startup-fallback { box-sizing: border-box; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 15% 10%, rgba(33, 165, 150, .17), transparent 28rem), #07131b; }
      #startup-fallback .startup-card { width: min(680px, 100%); border: 1px solid rgba(121, 210, 201, .25); border-radius: 14px; padding: 24px; background: rgba(6, 23, 31, .92); box-shadow: 0 20px 48px rgba(0, 0, 0, .28); }
      #startup-fallback h1 { margin: 0; font-size: 24px; }
      #startup-fallback p { color: #a6c4c4; line-height: 1.55; }
      #startup-fallback small { color: #54e0ba; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
      #startup-error { display: none; overflow: auto; margin-top: 14px; padding: 12px; color: #ffd2d2; border: 1px solid rgba(255, 103, 103, .32); border-radius: 8px; background: rgba(255, 103, 103, .06); white-space: pre-wrap; }
      #startup-fallback.is-error #startup-error { display: block; }
      #startup-fallback.is-error small { color: #ffb56b; }
    </style>
    <script type="module" crossorigin src="/assets/index-DjzKCg6R.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CPmcQTJ4.css">
  </head>
  <body>
    <div id="startup-fallback">
      <section class="startup-card">
        <small id="startup-status">Starting dashboard</small>
        <h1>Tiangou AI is loading…</h1>
        <p id="startup-message">The interface should appear within a few seconds. If this panel remains visible, the diagnostic message below will identify the startup issue.</p>
        <pre id="startup-error"></pre>
      </section>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        function showStartupError(message) {
          var fallback = document.getElementById('startup-fallback');
          var status = document.getElementById('startup-status');
          var details = document.getElementById('startup-error');
          var description = document.getElementById('startup-message');
          if (!fallback || !details) return;
          fallback.classList.add('is-error');
          if (status) status.textContent = 'Startup diagnostic';
          if (description) description.textContent = 'The dashboard JavaScript did not finish loading. Copy the message below and send it back for diagnosis.';
          details.textContent = String(message || 'Unknown startup error');
        }
        window.__tiangouShowStartupError = showStartupError;
        window.addEventListener('error', function (event) {
          showStartupError(event.error && event.error.stack ? event.error.stack : (event.message || 'JavaScript startup error'));
        });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason;
          showStartupError(reason && reason.stack ? reason.stack : String(reason || 'Unhandled startup promise rejection'));
        });
        window.setTimeout(function () {
          var root = document.getElementById('root');
          var fallback = document.getElementById('startup-fallback');
          if (fallback && root && !root.hasChildNodes()) {
            showStartupError('React did not mount the application. Confirm that you opened the exact URL printed by Vite and that no older development server is still using port 5173.');
          }
        }, 4500);
      }());
    </script>
  </body>
</html>
