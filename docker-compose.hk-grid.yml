services:
  hk-grid-backend:
    build:
      context: ./hk_grid_backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  hk-grid-frontend:
    build:
      context: ./hk_grid_frontend
    depends_on:
      hk-grid-backend:
        condition: service_healthy
    ports:
      - "8082:80"
    restart: unless-stopped
